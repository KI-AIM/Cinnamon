name: llm_tabular
version: "0.1"
type: cross-sectional
display_name: LLM Tabular Synthesizer
description: Generate synthetic tabular data using a configurable Ollama or OpenAI-compatible language model.
URL: /start_synthetization_process/llm_tabular
configurations:
  model_parameter:
    display_name: Model Parameters
    description: Configure the LLM provider, endpoint, authentication, and decoding behavior.
    parameters:
      - name: provider
        type: string
        label: Provider
        description: Select the LLM API type used by the synthesizer.
        default_value: openai_compatible
        values:
          - ollama
          - openai_compatible
      - name: model_name
        type: string
        label: Model Name
        description: Name of the model used by the configured LLM server.
        default_value: Qwen/Qwen3-32B
      - name: base_url
        type: string
        label: Base URL
        description: Base URL of the LLM server. 
        default_value: Enter Endpoint
      - name: endpoint_path
        type: string
        label: Endpoint Path
        description: Relative generation endpoint. Use /api/generate for Ollama or /v1/chat/completions for OpenAI-compatible servers.
        default_value: /v1/chat/completions
      - name: healthcheck_path
        type: string
        label: Healthcheck Path
        description: Relative endpoint used to validate connectivity. Use /api/tags for Ollama or /v1/models for OpenAI-compatible servers.
        default_value: /v1/models
      - name: api_key
        type: string
        label: API Key
        description: Optional bearer token for authenticated OpenAI-compatible servers.
        default_value: ""
      - name: temperature
        type: float
        label: Temperature
        description: Sampling temperature for generation. Lower values are more deterministic.
        default_value: 0.3
        min_value: 0.0
        max_value: 2.0
      - name: top_p
        type: float
        label: Top-p
        description: Nucleus sampling value for generation.
        default_value: 0.9
        min_value: 0.0
        max_value: 1.0
      - name: max_tokens
        type: integer
        label: Max Tokens
        description: Maximum number of output tokens per LLM response. Mainly used for OpenAI-compatible servers.
        default_value: 1024
        min_value: 1
        max_value: 32768
  model_fitting:
    display_name: Prompting and Runtime
    description: Configure profiling, retry, and request behavior.
    parameters:
      - name: profile_rows
        type: integer
        label: Profile Rows
        description: Maximum number of real rows used to estimate prompt statistics.
        default_value: 1000
        min_value: 1
        max_value: 100000
      - name: few_shot_rows
        type: integer
        label: Example Rows
        description: Number of real rows included as non-copyable structure examples in the prompt.
        default_value: 20
        min_value: 0
        max_value: 200
      - name: max_retries
        type: integer
        label: Max Retries
        description: Retry attempts per batch if returned rows are invalid or incomplete.
        default_value: 3
        min_value: 1
        max_value: 20
      - name: timeout_seconds
        type: integer
        label: Request Timeout
        description: HTTP timeout per Ollama request in seconds.
        default_value: 120
        min_value: 1
        max_value: 3600
  sampling:
    display_name: Sampling
    description: Define how many synthetic rows are generated.
    parameters:
      - name: num_samples
        type: integer
        label: Number of Samples
        description: Number of synthetic records to generate.
        default_value: 1000
        min_value: 1
        max_value: 1000000
