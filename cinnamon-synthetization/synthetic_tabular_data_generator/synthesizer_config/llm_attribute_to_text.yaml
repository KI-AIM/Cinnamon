name: llm_attribute_to_text
version: "0.1"
type: cross-sectional
display_name: LLM Attribute-to-Text Generator
description: Generate a new TEXT attribute from existing tabular attributes using a configurable Ollama or OpenAI-compatible language model.
URL: /start_synthetization_process/llm_attribute_to_text
configurations:
  model_parameter:
    display_name: Model Parameters
    description: Configure the LLM provider, endpoint, authentication, and decoding behavior.
    parameters:
      - name: provider
        type: string
        label: Provider
        description: Select the LLM API type used by the synthesizer.
        default_value: openai_compatible
        values:
          - ollama
          - openai_compatible
      - name: model_name
        type: string
        label: Model Name
        description: Name of the model used by the configured LLM server.
        default_value: Qwen/Qwen3-32B
      - name: base_url
        type: string
        label: Base URL
        description: Base URL of the LLM server.
        default_value: Enter Endpoint
      - name: endpoint_path
        type: string
        label: Endpoint Path
        description: Relative generation endpoint. Use /api/generate for Ollama or /v1/chat/completions for OpenAI-compatible servers.
        default_value: /v1/chat/completions
      - name: healthcheck_path
        type: string
        label: Healthcheck Path
        description: Relative endpoint used to validate connectivity. Use /api/tags for Ollama or /v1/models for OpenAI-compatible servers.
        default_value: /v1/models
      - name: api_key
        type: string
        label: API Key
        description: Optional bearer token for authenticated OpenAI-compatible servers.
        default_value: ""
      - name: target_text_column
        type: string
        label: Target TEXT Column
        description: Name of the TEXT attribute to generate. If missing in input, it will be added.
        default_value: generated_text
      - name: user_prompt
        type: string
        label: User Prompt
        description: Writing instruction for text generation, e.g. "Schreibe mir ein Arztbrief basierend auf den Daten."
        default_value: Schreibe mir ein Arztbrief basierend auf den Daten.
      - name: temperature
        type: float
        label: Temperature
        description: Sampling temperature for generation. Lower values are more deterministic.
        default_value: 0.3
        min_value: 0.0
        max_value: 2.0
      - name: top_p
        type: float
        label: Top-p
        description: Nucleus sampling value for generation.
        default_value: 0.9
        min_value: 0.0
        max_value: 1.0
      - name: max_tokens
        type: integer
        label: Max Tokens
        description: Maximum number of output tokens per LLM response. Mainly used for OpenAI-compatible servers.
        default_value: 1024
        min_value: 1
        max_value: 32768
  model_fitting:
    display_name: Prompting and Runtime
    description: Configure retry and request behavior.
    parameters:
      - name: max_retries
        type: integer
        label: Max Retries
        description: Retry attempts per generated row if the returned JSON row is invalid or unusable.
        default_value: 3
        min_value: 1
        max_value: 20
      - name: timeout_seconds
        type: integer
        label: Request Timeout
        description: HTTP timeout per request in seconds.
        default_value: 120
        min_value: 1
        max_value: 3600
