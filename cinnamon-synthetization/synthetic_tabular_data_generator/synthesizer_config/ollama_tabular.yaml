name: ollama_tabular
version: "0.1"
type: cross-sectional
display_name: Ollama LLM Tabular Synthesizer
description: Generate synthetic tabular data using a local Ollama language model.
URL: /start_synthetization_process/ollama_tabular
configurations:
  model_parameter:
    display_name: Model Parameters
    description: Configure the Ollama model endpoint and decoding behavior.
    parameters:
      - name: model_name
        type: string
        label: Ollama Model
        description: Name of the local Ollama model used for generation.
        default_value: llama3.2:1b
      - name: ollama_base_url
        type: string
        label: Ollama Base URL
        description: Base URL of the Ollama server. Use http://host.docker.internal:11434 when the module runs in Docker.
        default_value: http://127.0.0.1:11434
      - name: temperature
        type: float
        label: Temperature
        description: Sampling temperature for generation. Lower values are more deterministic.
        default_value: 0.3
        min_value: 0.0
        max_value: 2.0
      - name: top_p
        type: float
        label: Top-p
        description: Nucleus sampling value for generation.
        default_value: 0.9
        min_value: 0.0
        max_value: 1.0
  model_fitting:
    display_name: Prompting and Runtime
    description: Configure profiling, retry, and request behavior.
    parameters:
      - name: profile_rows
        type: integer
        label: Profile Rows
        description: Maximum number of real rows used to estimate prompt statistics.
        default_value: 1000
        min_value: 1
        max_value: 100000
      - name: few_shot_rows
        type: integer
        label: Example Rows
        description: Number of real rows included as non-copyable structure examples in the prompt.
        default_value: 20
        min_value: 0
        max_value: 200
      - name: max_retries
        type: integer
        label: Max Retries
        description: Retry attempts per batch if returned rows are invalid or incomplete.
        default_value: 3
        min_value: 1
        max_value: 20
      - name: timeout_seconds
        type: integer
        label: Request Timeout
        description: HTTP timeout per Ollama request in seconds.
        default_value: 120
        min_value: 1
        max_value: 3600
  sampling:
    display_name: Sampling
    description: Define how many synthetic rows are generated.
    parameters:
      - name: num_samples
        type: integer
        label: Number of Samples
        description: Number of synthetic records to generate.
        default_value: 1000
        min_value: 1
        max_value: 1000000
